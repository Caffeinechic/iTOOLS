# Copy .env.example to .env and set MONGO_ROOT_PASSWORD before starting.
services:
  mongo:
    image: mongo:6
    container_name: itools_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: itools_backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      PORT: "4000"
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/itools?authSource=admin
      NODE_ENV: production
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
        NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    container_name: itools_frontend
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
